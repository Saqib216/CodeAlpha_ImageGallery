<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%231a1a1a'/><path d='M30 65 L45 45 L55 55 L70 35 L80 65 Z' fill='none' stroke='%23a78bfa' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='40' cy='35' r='6' fill='%23a78bfa'/></svg>">
</head>

<body>
    <header>
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <i class="fa-solid fa-images"></i>
                    <span>LUMINA</span>
                </div>
                <span class="nav-tag">12 Photos</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1><span id="typewriter"></span><span class="cursor">|</span></h1>
            <p>A curated collection of high-quality photographs</p>
        </div>
    </section>

    <section class="filters">
        <div class="container">
            <div class="filter-controls">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search Photos...">
                </div>

                <div class="filter-buttons" id="filter-buttons">

                </div>
            </div>
        </div>
    </section>

    <section class="gallery">
        <div class="container">
            <div class="gallery-grid" id="gallery-grid">

            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="close-btn" id="close-lightbox">
                <i class="fa-solid fa-times"></i>
            </button>

            <div class="image-counter">
                <span id="current-index">1</span> / <span id="total-images">12</span>
            </div>

            <div class="lightbox-image-container">
                <img alt="" id="lightbox-image">

                <div class="image-info">
                    <h3 id="lightbox-title"></h3>
                    <span id="lightbox-category" class="category-tag"></span>
                </div>
            </div>

            <div class="lightbox-nav">
                <button id="prev-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
                <button id="next-btn">
                    <span>Next</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>

            <button class="download-btn" id="download-btn">
                <i class="fa-solid fa-unlock"></i>
                <span>Open Full Image</span>
            </button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
